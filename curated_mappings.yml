#This is where I add all curated mappings
connection:

# Applied to every table unless overridden on that table row.
defaults:
  catalog: "Elevate"
  schema: "landing"
  lakehouse_write: "curated"
  write_mode: "overwrite"
  write_schema_option: "overwriteSchema"
  extract:
    select_behavior: "individual columns"
    column_names: []
    select_creation_statement: ""
    filter_expression: null
    except_column: ""
    column_partition_name: null
    batch_size: 50000

# Each entry is one source → landing run. Add or reorder rows as needed.
tables:
  - id: company
    source_object: "company"
    landing_table_name: "company"
    column_names: [oneviewclientid AS company_id, clientname AS company_name, isdeleted AS is_deleted, city, state, country, addressline1 AS address1, addressline2 AS address2, postalcode AS postal_code, jllvertical AS jll_vertical,clientindustry,]
